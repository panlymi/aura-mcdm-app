name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,research]"
      - name: Static checks
        run: ruff check .
      - name: Tests
        run: pytest --cov=mcdm --cov-report=term-missing
