name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: py-${{ matrix.python-version }}
      - name: Sync locked dependencies
        run: uv sync --locked --all-extras
      - name: Static checks
        run: uv run --locked --all-extras ruff check .
      - name: Tests
        run: uv run --locked --all-extras pytest --cov=mcdm --cov-report=term-missing
      - name: Verify exported runtime requirements
        if: matrix.python-version == '3.12'
        run: |
          uv export --locked --no-dev --no-hashes --no-emit-project --no-header --no-annotate --output-file requirements.generated.txt
          diff --unified requirements.txt requirements.generated.txt
